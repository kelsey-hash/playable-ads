<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    body {
      margin: 0;
    }
    #cmp-spinner {
      border-radius: 50%;
      width: 50px; height: 50px;
      position: absolute;
      left: 50%; top: 50%;
      margin: -25px 0 0 -25px;
      border: 5px solid #333;
      border-bottom-color: #fff;
      opacity: 0;
      animation: cmp-spin 1s infinite linear, cmp-fade 0.5s ease-in 0.2s forwards;
    }
    @keyframes cmp-spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    @keyframes cmp-fade { from { opacity: 0; } to { opacity: 1; } }
  </style>
  <script>
    window.__CMP_XHR_SEND = window['XMLHt'+'tpRequest'].prototype.send;
    window.__CMP_CREATE_ELEMENT = document.createElement;
  </script>
</head>
<body>
  <script src="playable.js"></script>
</body>
</html>
